<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maximize AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0d;
  --panel:   #111115;
  --border:  #1e1e24;
  --text:    #e2e2e8;
  --muted:   #6b6b7a;
  --accent:  #4f46e5;
  --accent2: #7c3aed;
  --user-bg: #1a1a2e;
  --ai-bg:   #111115;
  --radius:  12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── AUTH ─────────────────────────────────────────── */
#auth-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.auth-box {
  width: 380px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
}

.auth-logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #818cf8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.auth-sub {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 32px;
}

.auth-tabs {
  display: flex;
  background: #0e0e12;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}

.auth-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 13px;
  cursor: pointer;
  border-radius: 8px;
  color: var(--muted);
  transition: all 0.2s;
}

.auth-tab.active {
  background: var(--accent);
  color: white;
}

.auth-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.auth-field label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.auth-field input {
  background: #0e0e12;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s;
}

.auth-field input:focus {
  border-color: var(--accent);
}

.auth-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.03em;
  transition: opacity 0.2s;
}

.auth-btn:hover { opacity: 0.85; }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.auth-error {
  color: #f87171;
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
  min-height: 16px;
}

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar {
  width: 260px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.3s;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.brand {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(135deg, #818cf8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 14px;
}

.new-chat-btn {
  width: 100%;
  padding: 10px 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  transition: opacity 0.2s;
}
.new-chat-btn:hover { opacity: 0.85; }

.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}

.conv-item {
  padding: 10px 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.conv-item:hover { background: #1a1a20; color: var(--text); }
.conv-item.active { background: #1a1a2e; color: var(--text); }

.conv-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0;
}
.conv-item.active .conv-dot { opacity: 1; }

.sidebar-footer {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
}

.logout-btn {
  width: 100%;
  padding: 9px 12px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.logout-btn:hover { color: var(--text); border-color: #333; }

/* ── MAIN ─────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.main-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── CHAT ─────────────────────────────────────────── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
}

.empty-logo {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #818cf8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.empty-sub {
  font-size: 14px;
  text-align: center;
  max-width: 260px;
  line-height: 1.6;
}

.msg-row {
  display: flex;
  gap: 10px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}

.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: white;
}

.msg-row.ai .msg-avatar {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.7;
  max-width: calc(100% - 50px);
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-row.user .msg-bubble {
  background: var(--user-bg);
  border: 1px solid #2a2a4a;
  border-bottom-right-radius: 4px;
}

.msg-row.ai .msg-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  color: #c8c8d4;
  border-bottom-left-radius: 4px;
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ── INPUT ─────────────────────────────────────────── */
.input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.input-wrap {
  display: flex;
  gap: 10px;
  max-width: 800px;
  margin: 0 auto;
  background: #111116;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.2s;
}

.input-wrap:focus-within { border-color: var(--accent); }

.input-wrap textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  resize: none;
  line-height: 1.5;
  max-height: 140px;
  padding: 6px 0;
}

.send-btn {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: flex-end;
  transition: opacity 0.2s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── OVERLAY ────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 9;
}

/* ── MOBILE ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .menu-btn { display: block; }

  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
    transform: translateX(-100%);
  }

  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; }
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 4px; }
</style>
</head>
<body>

<!-- ── AUTH ──────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Maximize AI</div>
    <div class="auth-sub">Seu assistente inteligente</div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchTab('register')">Criar conta</div>
    </div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="seu@email.com">
    </div>
    <div class="auth-field">
      <label>Senha</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doAuth()">
    </div>

    <button class="auth-btn" id="auth-btn" onclick="doAuth()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── OVERLAY (mobile) ────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ────────────────────────────────────────── -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">Maximize AI</div>
    <button class="new-chat-btn" onclick="novoChat()">
      <span>＋</span> Nova conversa
    </button>
  </div>

  <div class="conv-list" id="conv-list"></div>

  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">Sair da conta</button>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────── -->
<div class="main">
  <div class="main-header">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div class="header-title" id="header-title">Maximize AI</div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-logo">Maximize AI</div>
      <div class="empty-sub">Inicie uma conversa — estou aqui para ajudar.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg" rows="1" placeholder="Digite sua mensagem..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="enviar()">↑</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────
const API = "https://maximize-api-ag1i.onrender.com"; // troca pela URL do Render em produção

// ── STATE ──────────────────────────────────────────────
let token   = localStorage.getItem("token") || null;
let convId  = null;
let convs   = [];
let sending = false;

// ── BOOT ───────────────────────────────────────────────
(async () => {
  if (token) {
    document.getElementById("auth-screen").style.display = "none";
    await loadConvs();
  }
})();

// ── AUTH ───────────────────────────────────────────────
let authMode = "login";

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll(".auth-tab").forEach((t,i) => {
    t.classList.toggle("active", (i===0 && mode==="login") || (i===1 && mode==="register"));
  });
  document.getElementById("auth-btn").textContent = mode === "login" ? "Entrar" : "Criar conta";
  document.getElementById("auth-error").textContent = "";
}

async function doAuth() {
  const email    = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const btn      = document.getElementById("auth-btn");
  const errEl    = document.getElementById("auth-error");

  if (!email || !password) { errEl.textContent = "Preencha todos os campos."; return; }

  btn.disabled = true;
  btn.textContent = "Aguarde...";
  errEl.textContent = "";

  try {
    const res  = await fetch(`${API}/auth/${authMode}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || "Erro desconhecido.";
      return;
    }

    token = data.token;
    localStorage.setItem("token", token);
    document.getElementById("auth-screen").style.display = "none";
    await loadConvs();

  } catch {
    errEl.textContent = "Erro de conexão com o servidor.";
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === "login" ? "Entrar" : "Criar conta";
  }
}

function logout() {
  token = null;
  localStorage.removeItem("token");
  location.reload();
}

// ── CONVERSATIONS ──────────────────────────────────────
async function loadConvs() {
  const res  = await apiFetch("/conversations");
  if (!res.ok) { logout(); return; }
  convs = await res.json();
  renderConvList();

  if (convs.length > 0) openConv(convs[0].id, convs[0].title);
}

function renderConvList() {
  const list = document.getElementById("conv-list");
  list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === convId ? 'active' : ''}" onclick="openConv('${c.id}','${esc(c.title)}')">
      <div class="conv-dot"></div>
      ${esc(c.title)}
    </div>
  `).join("");
}

async function openConv(id, title) {
  convId = id;
  document.getElementById("header-title").textContent = title;
  renderConvList();
  closeSidebar();

  const res  = await apiFetch(`/conversations/${id}/messages`);
  const msgs = await res.json();
  const area = document.getElementById("chat-area");

  area.innerHTML = "";
  msgs.forEach(m => appendMsg(m.role, m.content));
  if (!msgs.length) area.innerHTML = emptyHTML();
  scrollBottom();
}

async function novoChat() {
  const res  = await apiFetch("/conversations", { method: "POST", body: JSON.stringify({}) });
  const data = await res.json();
  convs.unshift(data);
  renderConvList();
  convId = data.id;
  document.getElementById("header-title").textContent = "Nova conversa";
  document.getElementById("chat-area").innerHTML = emptyHTML();
  closeSidebar();
}

// ── CHAT ───────────────────────────────────────────────
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}

async function enviar() {
  if (sending) return;
  const input = document.getElementById("msg");
  const txt   = input.value.trim();
  if (!txt || !convId) return;

  sending = true;
  document.getElementById("send-btn").disabled = true;
  input.value = "";
  autoResize(input);

  // remove empty state
  const area = document.getElementById("chat-area");
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();

  appendMsg("user", txt);

  // AI bubble com cursor
  const aiRow = document.createElement("div");
  aiRow.className = "msg-row ai";
  aiRow.innerHTML = `
    <div class="msg-avatar">M</div>
    <div class="msg-bubble" id="streaming-bubble"><span class="cursor"></span></div>
  `;
  area.appendChild(aiRow);
  scrollBottom();

  const bubble = document.getElementById("streaming-bubble");
  let full = "";

  try {
    const res = await fetch(`${API}/conversations/${convId}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ message: txt })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      full += chunk;
      bubble.textContent = full;
      bubble.innerHTML += '<span class="cursor"></span>';
      scrollBottom();
    }

    bubble.textContent = full;

    // atualiza título na sidebar se for a primeira msg
    const item = [...document.querySelectorAll(".conv-item")].find(el => el.onclick?.toString().includes(convId));
    const conv = convs.find(c => c.id === convId);
    if (conv && conv.title === "Nova conversa") {
      conv.title = txt.slice(0, 50);
      document.getElementById("header-title").textContent = conv.title;
      renderConvList();
    }

  } catch {
    bubble.textContent = "Erro ao conectar com o servidor.";
  } finally {
    sending = false;
    document.getElementById("send-btn").disabled = false;
    bubble.removeAttribute("id");
  }
}

// ── HELPERS ────────────────────────────────────────────
function appendMsg(role, content) {
  const area = document.getElementById("chat-area");
  const div  = document.createElement("div");
  div.className = `msg-row ${role === "user" ? "user" : "ai"}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === "user" ? "U" : "M"}</div>
    <div class="msg-bubble">${esc(content)}</div>
  `;
  area.appendChild(div);
}

function emptyHTML() {
  return `<div class="empty-state" id="empty-state">
    <div class="empty-logo">Maximize AI</div>
    <div class="empty-sub">Inicie uma conversa — estou aqui para ajudar.</div>
  </div>`;
}

function scrollBottom() {
  const a = document.getElementById("chat-area");
  a.scrollTop = a.scrollHeight;
}

function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}

function apiFetch(path, opts = {}) {
  return fetch(`${API}${path}`, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(opts.headers || {})
    }
  });
}

function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}
</script>
</body>
</html>
